<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGI — Criar Conta</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body class="login-bg d-flex align-items-center">

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-11 col-sm-9 col-md-6 col-lg-4">

        <div class="card border-0 shadow-lg rounded-4 p-4 p-md-5">

          <!-- Logo -->
          <div class="login-logo text-center mb-4">
            <img src="https://cdn-icons-png.flaticon.com/512/2716/2716652.png" alt="SGI" class="mb-3" />
            <h1 class="h5 fw-bold mb-1">SGI — Criar Conta</h1>
            <p class="text-muted small mb-0">Sistema de T.I. · Unifametro 2026</p>
          </div>

          <!-- Mensagens -->
          <div id="cadastro-erro" class="alert alert-danger login-erro py-2 small mb-3" role="alert"></div>
          <div id="cadastro-sucesso" class="alert alert-success login-sucesso py-2 small mb-3" role="alert">
            Usuário cadastrado com sucesso!
          </div>

          <!-- Campos -->
          <div class="mb-3">
            <label for="inp-nome" class="form-label small fw-semibold text-uppercase text-secondary">
              Nome Completo
            </label>
            <input type="text" id="inp-nome" class="form-control" placeholder="Seu nome completo" />
          </div>

          <div class="mb-3">
            <label for="inp-email" class="form-label small fw-semibold text-uppercase text-secondary">
              Email
            </label>
            <input type="email" id="inp-email" class="form-control" placeholder="seu@email.com" />
          </div>

          <div class="mb-3">
            <label for="inp-senha" class="form-label small fw-semibold text-uppercase text-secondary">
              Senha
            </label>
            <input type="password" id="inp-senha" class="form-control" placeholder="Mínimo 6 caracteres" />
          </div>

          <div class="mb-3">
            <label for="inp-confirmar" class="form-label small fw-semibold text-uppercase text-secondary">
              Confirmar Senha
            </label>
            <input type="password" id="inp-confirmar" class="form-control" placeholder="••••••••" />
          </div>

          <div class="mb-3">
            <label for="inp-profissao" class="form-label small fw-semibold text-uppercase text-secondary">
              Profissão
            </label>
            <select id="inp-profissao" class="form-select">
              <option value="">Selecione uma profissão</option>
              <option value="n1">Analista de Suporte N1</option>
              <option value="n2">Analista de Suporte N2</option>
              <option value="n3">Especialista N3</option>
              <option value="gestor">Gestor de TI</option>
              <option value="dev">Desenvolvedor</option>
              <option value="redes">Administrador de Redes</option>
              <option value="sistemas">Administrador de Sistemas</option>
              <option value="estagiario">Estagiário</option>
            </select>
          </div>

          <button class="btn btn-sgi w-100 mt-1" onclick="cadastrar()">Cadastrar</button>

          <div class="text-center mt-3">
            <a href="index.html" class="small fw-medium text-decoration-none" style="color: var(--sgi-accent);">
              Já tenho uma conta
            </a>
          </div>

          <p class="text-center text-muted mt-4 mb-0" style="font-size: 11px;">
            SGI v1.0 · Unifametro · 2026
          </p>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/cadastro.js"></script>

</body>
</html>
